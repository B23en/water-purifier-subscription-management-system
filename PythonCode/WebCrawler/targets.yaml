version: 1

settings:
  timezone: Asia/Seoul
  default_language: ko
  default_country: KR

brands:
  - id: coway
    name: 코웨이
    priority: 1
    aliases: [Coway]
    official_urls:
      - https://www.coway.com/

  - id: cuckoo
    name: 쿠쿠
    priority: 1
    aliases: [쿠쿠홈시스, CUCKOO, 쿠쿠 인스퓨어, 인스퓨어]
    official_urls:
      - https://www.cuckoo.co.kr/

  - id: sk_magic
    name: SK매직
    priority: 1
    aliases: [SK magic, SK매직몰]
    official_urls:
      - https://www.skmagic.com/

  - id: samsung_electronics
    name: 삼성전자
    priority: 1
    aliases: [삼성, Samsung, BESPOKE, 비스포크, 삼성닷컴]
    official_urls:
      - https://www.samsung.com/sec/water-purifier/all-water-purifier/

category_terms:
  core:
    - 정수기

  product_types:
    - 얼음정수기
    - 직수정수기
    - 냉온정수기
    - 냉정수기
    - 온정수기
    - 미니정수기
    - 언더싱크 정수기
    - 스파클링 정수기
    - 탄산수 정수기
    - 미네랄 정수기
    - 알칼리 정수기

  sales_terms:
    - 구매
    - 렌탈
    - 일시불
    - 구독
    - 월 렌탈료
    - 카드할인

market_terms:
  launch:
    - 신제품
    - 출시
    - 공개

  promotion:
    - 프로모션
    - 할인
    - 특가
    - 혜택
    - 사은품
    - 무료
    - 감사제
    - 페스티벌
    - 기획전
    - 이벤트

  marketing:
    - 광고
    - 캠페인
    - 홈쇼핑
    - 라이브커머스

  risk:
    - 리콜
    - 품질
    - 불량
    - 누수
    - AS

reaction_terms:
  - 후기
  - 추천
  - 비교
  - 장점
  - 단점
  - AS
  - 필터
  - 필터 교체
  - 소음
  - 누수
  - 위약금
  - 설치
  - 관리

context_rules:
  product_context_terms:
    - 정수기
    - 얼음정수기
    - 직수정수기
    - 렌탈
    - 구매
    - 가전
    - 필터
    - 설치
    - 관리
    - 렌탈료
    - 가격

query_strategy:
  max_queries_per_brand_per_source: 15

  template_groups:
    news_market:
      - "{brand} 정수기 {launch}"
      - "{brand} 정수기 {promotion}"
      - "{brand} 정수기 {marketing}"
      - "{brand} 정수기 {risk}"
      - "{brand} {product_type} {promotion}"

    consumer_reaction:
      - "{brand} 정수기 {reaction}"
      - "{brand} {product_type} {reaction}"

    broad_market:
      - "정수기 {launch}"
      - "정수기 {promotion}"
      - "정수기 {risk}"
      - "{product_type} {promotion}"

sources:
  naver_news:
    enabled: true
    type: api
    cadence: daily
    use_template_groups:
      - news_market
      - broad_market
    max_results_per_query: 50

  naver_blog:
    enabled: true
    type: api
    cadence: daily
    use_template_groups:
      - consumer_reaction
    max_results_per_query: 30

  naver_cafe:
    enabled: true
    type: api
    cadence: daily
    use_template_groups:
      - consumer_reaction
    max_results_per_query: 30

  naver_datalab_search:
    enabled: true
    type: api
    cadence: daily
    keywords:
      - 정수기
      - 얼음정수기
      - 직수정수기
      - 정수기 구매
      - 정수기 렌탈
      - 코웨이 정수기
      - 쿠쿠 정수기
      - SK매직 정수기
      - 청호나이스 정수기

  official_mall:
    enabled: false
    type: scrape
    cadence: daily

  shopping_review:
    enabled: false
    type: scrape
    cadence: weekly



